name: Build and Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/infernus101/pygres:latest

      - name: Redeploy stack in Portainer
        run: |
          COMPOSE=$(cat <<'EOF'
          version: "3.8"
          services:
            pygres:
              image: ghcr.io/infernus101/pygres:latest
              container_name: pygres
              restart: unless-stopped
              environment:
                DATABASE_URL: $DATABASE_URL
                API_KEY: $API_KEY
                DB_POOL_SIZE: "5"
                DB_MAX_OVERFLOW: "10"
              cap_drop:
                - ALL
              security_opt:
                - no-new-privileges:true
              networks:
                - nginx-proxy-network
          networks:
            nginx-proxy-network:
              external: true
          EOF
          )

          curl -s -X PUT \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=3" \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\": $(echo "$COMPOSE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'), \"env\": [], \"pullImage\": true}"
