name: Build and Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/infernus101/pygres:latest

      - name: Redeploy stack in Portainer
        run: |
          STACK_ID="${{ secrets.PORTAINER_STACK_ID }}"
          PORTAINER_URL="${{ secrets.PORTAINER_URL }}"
          TOKEN="${{ secrets.PORTAINER_TOKEN }}"

          # Get current stack config
          STACK=$(curl -s -X GET \
            "${PORTAINER_URL}/api/stacks/${STACK_ID}" \
            -H "X-API-Key: ${TOKEN}")

          ENV_VARS=$(echo "$STACK" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin).get('Env', [])))")
          COMPOSE=$(echo "$STACK" | python3 -c "import sys,json; print(json.load(sys.stdin).get('StackFileContent', ''))")

          # Trigger redeploy with image pull
          curl -s -X PUT \
            "${PORTAINER_URL}/api/stacks/${STACK_ID}?endpointId=3" \
            -H "X-API-Key: ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\": $(echo "$COMPOSE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'), \"env\": ${ENV_VARS}, \"pullImage\": true}"
